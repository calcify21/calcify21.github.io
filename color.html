<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <script>
      (function () {
        const theme = localStorage.getItem("theme") || "auto";
        if (
          theme === "dark" ||
          (theme === "auto" &&
            (new Date().getHours() >= 19 || new Date().getHours() < 7))
        ) {
          document.documentElement.setAttribute("data-theme", "dark");
        } else {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color Converter | Calcify</title>
    <meta
      name="description"
      content="Convert colors between HEX, RGB, and HSL formats. Featuring a real-time preview and instant copy-to-clipboard functionality."
    />
    <link rel="canonical" href="https://calc.aurabyte.in/color" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="assets/fontawesome/css/all.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/tool-page.css" />
    <link rel="stylesheet" href="css/color.css" />

    <link rel="icon" href="assets/images/favicon-2.ico" type="image/x-icon" />
  </head>

  <body>
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="myBar"></div>
    </div>
    <header data-load="components/navbar.html"></header>

    <main>
      <div class="max-w-2xl mx-auto px-4 py-10">
        <!-- Hero -->
        <div class="text-center mb-8 animate-fade-in-up">
          <div
            class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full text-xs font-semibold mb-4"
            style="background: var(--accent-glow); color: var(--accent)"
          >
            <i class="fa-solid fa-palette"></i> Design Tool
          </div>
          <h1
            class="text-2xl sm:text-3xl font-black mb-2"
            style="color: var(--text-primary)"
          >
            Color Converter
          </h1>
          <p class="text-sm" style="color: var(--text-muted)">
            Effortlessly switch between HEX, RGB, and HSL color formats with
            live preview.
          </p>
        </div>

        <!-- Tool Container -->
        <div class="card-fresh p-6 sm:p-8 mb-4 animate-fade-in-up stagger-1">
          <div class="flex flex-col gap-8">
            <!-- Preview & Picker -->
            <div class="flex items-center gap-6">
              <div
                id="colorPreview"
                class="w-24 h-24 rounded-2xl shadow-inner border-4 border-white dark:border-slate-800 transition-all duration-300"
                style="background: #f59e0b"
              ></div>
              <div class="flex-grow">
                <label
                  class="block text-xs font-bold mb-2 uppercase tracking-wider"
                  style="color: var(--text-muted)"
                  >Pick a color</label
                >
                <input
                  type="color"
                  id="colorPicker"
                  class="w-full h-12 rounded-lg cursor-pointer bg-transparent border-none"
                  value="#f59e0b"
                  oninput="updateFromPicker(this.value)"
                />
              </div>
            </div>

            <div class="divider"></div>

            <!-- Conversion Fields -->
            <div class="space-y-6">
              <!-- HEX -->
              <div class="relative group">
                <label
                  class="block text-xs font-bold mb-2 uppercase tracking-wider"
                  style="color: var(--text-muted)"
                  >HEX Format</label
                >
                <div class="flex gap-2">
                  <input
                    type="text"
                    id="hexInput"
                    class="form-control text-xl font-bold font-mono tracking-wider"
                    value="#F59E0B"
                    oninput="updateFromHex(this.value)"
                  />
                  <button
                    onclick="copyToClipboard('hexInput')"
                    class="btn-calc btn-calc-secondary px-4"
                    title="Copy HEX"
                  >
                    <i class="fa-regular fa-copy"></i>
                  </button>
                </div>
              </div>

              <!-- RGB -->
              <div class="relative group">
                <label
                  class="block text-xs font-bold mb-2 uppercase tracking-wider"
                  style="color: var(--text-muted)"
                  >RGB Format</label
                >
                <div class="flex gap-2">
                  <input
                    type="text"
                    id="rgbInput"
                    class="form-control text-xl font-bold font-mono tracking-wider"
                    value="rgb(245, 158, 11)"
                    oninput="updateFromRgb(this.value)"
                  />
                  <button
                    onclick="copyToClipboard('rgbInput')"
                    class="btn-calc btn-calc-secondary px-4"
                    title="Copy RGB"
                  >
                    <i class="fa-regular fa-copy"></i>
                  </button>
                </div>
              </div>

              <!-- HSL -->
              <div class="relative group">
                <label
                  class="block text-xs font-bold mb-2 uppercase tracking-wider"
                  style="color: var(--text-muted)"
                  >HSL Format</label
                >
                <div class="flex gap-2">
                  <input
                    type="text"
                    id="hslInput"
                    class="form-control text-xl font-bold font-mono tracking-wider"
                    value="hsl(38, 92%, 50%)"
                    oninput="updateFromHsl(this.value)"
                  />
                  <button
                    onclick="copyToClipboard('hslInput')"
                    class="btn-calc btn-calc-secondary px-4"
                    title="Copy HSL"
                  >
                    <i class="fa-regular fa-copy"></i>
                  </button>
                </div>
              </div>
            </div>
          </div>

          <div
            class="mt-8 text-center bg-purple-50 dark:bg-purple-900/10 p-4 rounded-xl border border-purple-100 dark:border-purple-900/30"
          >
            <i class="fa-solid fa-code text-purple-500 mb-1"></i>
            <p
              class="text-xs font-semibold"
              style="color: var(--text-secondary)"
            >
              Supports real-time bidirectional conversion across all formats.
            </p>
          </div>
        </div>

        <!-- Scroll Buttons -->
        <button onclick="gototop()" id="topbtn" aria-label="Scroll to top">
          <i class="fa-solid fa-arrow-up"></i>
        </button>
      </div>
    </main>

    <footer
      class="footer-custom mt-8"
      data-load="components/footer.html"
    ></footer>

    <script src="js/common.js"></script>
    <script src="js/color.js"></script>
  </body>
</html>
