<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <script>
      (function () {
        const theme = localStorage.getItem("theme") || "auto";
        if (
          theme === "dark" ||
          (theme === "auto" &&
            (new Date().getHours() >= 19 || new Date().getHours() < 7))
        ) {
          document.documentElement.setAttribute("data-theme", "dark");
        } else {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipe Search | Cook Your Favorite Dishes | Calcify</title>
    <meta
      name="description"
      content="Find thousands of delicious recipes with easy-to-follow instructions, ingredients, and video tutorials on Calcify's Recipe App."
    />

    <link rel="canonical" href="https://calc.aurabyte.in/recipe" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="assets/fontawesome/css/all.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/tool-page.css" />
    <link rel="stylesheet" href="css/recipe.css" />

    <link rel="icon" href="assets/images/favicon-2.ico" type="image/x-icon" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://calc.aurabyte.in/recipe" />
    <meta property="og:title" content="Recipe Search Tool | Calcify" />
    <meta
      property="og:description"
      content="Discover new recipes and cooking inspiration with our easy recipe search tool."
    />
    <meta
      property="og:image"
      content="https://calc.aurabyte.in/assets/images/thumbnail.png"
    />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Recipe Search - Calcify",
        "description": "Find and explore recipes with detailed instructions and ingredients.",
        "url": "https://calc.aurabyte.in/recipe",
        "applicationCategory": "LifeStyleApplication",
        "publisher": {
          "@type": "Organization",
          "name": "Aurabyte",
          "url": "https://aurabyte.in"
        }
      }
    </script>
  </head>

  <body>
    <header data-load="components/navbar.html"></header>
    <main>
      <div class="max-w-6xl mx-auto px-4 py-8">
        <!-- Search Section -->
        <div class="text-center mb-12">
          <span
            class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold bg-orange-100 text-orange-700 mb-3"
          >
            <i class="fa-solid fa-utensils"></i> Foodie Hub
          </span>
          <h1 class="text-4xl font-bold mb-4">Recipe Search</h1>
          <p class="text-gray-500 max-w-lg mx-auto mb-8">
            Discover recipes from around the world. Search by dish name or
            ingredient.
          </p>

          <div class="max-w-xl mx-auto flex gap-2">
            <input
              type="text"
              id="recipeInput"
              class="form-control text-lg py-3 px-6 rounded-full"
              placeholder="What do you want to cook today?"
            />
            <button
              class="btn-calc btn-calc-primary rounded-full px-8"
              onclick="getRecipes()"
            >
              <i class="fa-solid fa-magnifying-glass"></i>
            </button>
          </div>
        </div>

        <!-- Results Grid -->
        <div
          id="recipeResults"
          class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 min-h-[40vh]"
        >
          <!-- Placeholder / Initial State -->
          <div
            class="col-span-full flex flex-col items-center justify-center text-gray-400 py-12"
          >
            <i class="fa-solid fa-bowl-food text-6xl mb-4 opacity-20"></i>
            <p>Hungry? Search for a recipe above to get started!</p>
          </div>
        </div>
      </div>

      <!-- Custom Modal for Recipe Details -->
      <div class="modal-overlay" id="recipeModal">
        <div class="modal-container" style="--modal-width: 1000px">
          <div class="modal-header">
            <h2 class="text-xl font-bold" id="modalRecipeName">
              Recipe Details
            </h2>
            <button class="modal-close" onclick="closeRecipeModal()">
              <i class="fa-solid fa-xmark text-lg"></i>
            </button>
          </div>
          <div class="modal-body p-0">
            <div class="flex flex-col md:flex-row">
              <!-- Left: Image & Quick Info -->
              <div
                class="md:w-1/3 border-r border-gray-100 dark:border-gray-800"
              >
                <img
                  id="modalRecipeImg"
                  src=""
                  alt=""
                  class="w-full aspect-square object-cover"
                />
                <div class="p-6">
                  <div class="flex flex-wrap gap-2 mb-4">
                    <span
                      id="modalRecipeCategory"
                      class="px-3 py-1 bg-amber-100 text-amber-700 text-xs font-bold rounded-full"
                    ></span>
                    <span
                      id="modalRecipeArea"
                      class="px-3 py-1 bg-blue-100 text-blue-700 text-xs font-bold rounded-full"
                    ></span>
                  </div>
                  <div class="space-y-3">
                    <a
                      id="modalYoutubeLink"
                      href="#"
                      target="_blank"
                      class="flex items-center gap-2 text-red-600 font-bold hover:underline"
                    >
                      <i class="fa-brands fa-youtube text-lg"></i> Watch
                      Tutorial
                    </a>
                    <button
                      id="modalShareBtn"
                      class="flex items-center gap-2 text-amber-500 font-bold hover:underline"
                    >
                      <i class="fa-solid fa-share-nodes"></i> Share Recipe
                    </button>
                  </div>
                </div>
              </div>

              <!-- Right: Ingredients & Methods -->
              <div
                class="md:w-2/3 p-6 max-h-[70vh] overflow-y-auto custom-scrollbar"
              >
                <div class="mb-8">
                  <h3
                    class="text-lg font-bold mb-4 flex items-center gap-2 border-b pb-2"
                  >
                    <i class="fa-solid fa-list-check text-amber-500"></i>
                    Ingredients
                  </h3>
                  <ul
                    id="modalIngredients"
                    class="grid grid-cols-1 sm:grid-cols-2 gap-2 text-sm"
                  ></ul>
                </div>

                <div>
                  <h3
                    class="text-lg font-bold mb-4 flex items-center gap-2 border-b pb-2"
                  >
                    <i class="fa-solid fa-kitchen-set text-amber-500"></i>
                    Instructions
                  </h3>
                  <div
                    id="modalInstructions"
                    class="text-sm leading-relaxed text-gray-600 dark:text-gray-400 whitespace-pre-line"
                  ></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <footer data-load="components/footer.html"></footer>

    <script src="js/common.js"></script>
    <script src="js/recipe.js"></script>
  </body>
</html>
