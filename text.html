<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <script>
      (function () {
        const theme = localStorage.getItem("theme") || "auto";
        if (
          theme === "dark" ||
          (theme === "auto" &&
            (new Date().getHours() >= 19 || new Date().getHours() < 7))
        ) {
          document.documentElement.setAttribute("data-theme", "dark");
        } else {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text & Code Utilities | Calcify</title>
    <meta
      name="description"
      content="Comprehensive text and code utility suite. Includes case conversion, Base64 encoding/decoding, JSON formatting, and text cleanup tools."
    />
    <link rel="canonical" href="https://calc.aurabyte.in/text" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="assets/fontawesome/css/all.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/tool-page.css" />
    <link rel="stylesheet" href="css/text.css" />

    <!-- Code Formatter Engine -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.15.1/beautify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.15.1/beautify-html.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.15.1/beautify-css.min.js"></script>

    <link rel="icon" href="assets/images/favicon-2.ico" type="image/x-icon" />
  </head>

  <body>
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="myBar"></div>
    </div>
    <header data-load="components/navbar.html"></header>

    <main>
      <div class="max-w-4xl mx-auto px-4 py-10">
        <!-- Hero -->
        <div class="text-center mb-8 animate-fade-in-up">
          <div
            class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full text-xs font-semibold mb-4"
            style="background: var(--accent-glow); color: var(--accent)"
          >
            <i class="fa-solid fa-font"></i> Text Suite
          </div>
          <h1
            class="text-2xl sm:text-3xl font-black mb-2"
            style="color: var(--text-primary)"
          >
            Text & Code Utilities
          </h1>
          <p class="text-sm" style="color: var(--text-muted)">
            Clean, format, and transform your text or code instantly.
          </p>
        </div>

        <!-- Tool Container -->
        <div class="card-fresh p-6 sm:p-8 mb-4 animate-fade-in-up stagger-1">
          <div class="grid grid-cols-1 gap-6">
            <!-- Main Textarea -->
            <div>
              <div class="flex justify-between items-center mb-3">
                <label
                  class="block text-xs font-bold uppercase tracking-wider"
                  style="color: var(--text-muted)"
                  >Input Text / Code</label
                >
                <div
                  class="flex gap-4 text-[10px] font-bold uppercase"
                  style="color: var(--text-secondary)"
                >
                  <span>Words: <span id="wordCount">0</span></span>
                  <span>Chars: <span id="charCount">0</span></span>
                </div>
              </div>
              <textarea
                id="mainText"
                class="form-control font-mono text-sm leading-relaxed p-4"
                rows="10"
                placeholder="Paste your text or code here..."
                oninput="updateCounts()"
              ></textarea>
            </div>

            <!-- Action Toolbar -->
            <div
              class="flex flex-wrap gap-2 p-4 rounded-2xl bg-slate-50 dark:bg-slate-900/40 border border-[var(--border-color)]"
            >
              <!-- Case Group -->
              <div
                class="flex flex-wrap gap-2 mr-4 pr-4 border-r border-[var(--border-color)]"
              >
                <button
                  onclick="transform('UPPER')"
                  class="tool-btn"
                  title="UPPERCASE"
                >
                  ABC
                </button>
                <button
                  onclick="transform('LOWER')"
                  class="tool-btn"
                  title="lowercase"
                >
                  abc
                </button>
                <button
                  onclick="transform('TITLE')"
                  class="tool-btn"
                  title="Title Case"
                >
                  Abc
                </button>
              </div>

              <!-- Clean Group -->
              <div
                class="flex flex-wrap gap-2 mr-4 pr-4 border-r border-[var(--border-color)]"
              >
                <button onclick="transform('TRIM')" class="tool-btn">
                  <i class="fa-solid fa-scissors mr-1"></i> Trim
                </button>
                <button onclick="transform('CLEAN')" class="tool-btn">
                  <i class="fa-solid fa-broom mr-1"></i> Clean Space
                </button>
              </div>

              <!-- Dev Group -->
              <div class="flex flex-wrap gap-2">
                <button
                  onclick="transform('B64_ENC')"
                  class="tool-btn bg-indigo-500 text-white border-none!"
                >
                  B64 Encode
                </button>
                <button
                  onclick="transform('B64_DEC')"
                  class="tool-btn bg-indigo-500 text-white border-none!"
                >
                  B64 Decode
                </button>
              </div>

              <!-- Code Formatter Group -->
              <div
                class="flex flex-wrap gap-2 w-full mt-2 pt-3 border-t border-[var(--border-color)]"
              >
                <span
                  class="text-[10px] font-bold uppercase tracking-wider self-center mr-2"
                  style="color: var(--text-muted)"
                  >Format:</span
                >
                <button
                  onclick="formatCode('HTML')"
                  class="tool-btn bg-orange-500 text-white border-none!"
                >
                  <i class="fa-brands fa-html5 mr-1"></i> HTML
                </button>
                <button
                  onclick="formatCode('CSS')"
                  class="tool-btn bg-blue-500 text-white border-none!"
                >
                  <i class="fa-brands fa-css3-alt mr-1"></i> CSS
                </button>
                <button
                  onclick="formatCode('JS')"
                  class="tool-btn bg-yellow-500 text-white border-none!"
                >
                  <i class="fa-brands fa-js mr-1"></i> JavaScript
                </button>
                <button
                  onclick="formatCode('XML')"
                  class="tool-btn bg-teal-600 text-white border-none!"
                >
                  <i class="fa-solid fa-code mr-1"></i> XML
                </button>
                <button
                  onclick="formatCode('SQL')"
                  class="tool-btn bg-violet-600 text-white border-none!"
                >
                  <i class="fa-solid fa-database mr-1"></i> SQL
                </button>
                <button
                  onclick="transform('JSON')"
                  class="tool-btn bg-emerald-500 text-white border-none!"
                >
                  <i class="fa-solid fa-code mr-1"></i> JSON
                </button>
              </div>

              <div class="flex-grow"></div>

              <button
                onclick="copyAll()"
                class="tool-btn bg-[var(--accent)] text-white border-none!"
              >
                <i class="fa-regular fa-copy mr-1"></i>Copy Result
              </button>
              <button
                onclick="clearText()"
                class="tool-btn border-red-200 text-red-500 hover:bg-red-50"
              >
                <i class="fa-solid fa-trash-can"></i>
              </button>
            </div>
          </div>

          <div
            class="mt-8 text-center bg-blue-50 dark:bg-blue-900/10 p-4 rounded-xl border border-blue-100 dark:border-blue-900/30"
          >
            <i class="fa-solid fa-shield-halved text-blue-500 mb-1"></i>
            <p
              class="text-xs font-semibold"
              style="color: var(--text-secondary)"
            >
              All processing is done locally in your browser. Your data never
              leaves your device.
            </p>
          </div>
        </div>

        <!-- Scroll Buttons -->
        <button onclick="gototop()" id="topbtn" aria-label="Scroll to top">
          <i class="fa-solid fa-arrow-up"></i>
        </button>
      </div>
    </main>

    <footer
      class="footer-custom mt-8"
      data-load="components/footer.html"
    ></footer>

    <script src="js/common.js"></script>
    <script src="js/text.js"></script>
  </body>
</html>
