<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jai Jinendra 🙏</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF9800">
<meta name="apple-mobile-web-app-capable" content="yes">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-card">
        <header>
            <div class="logo">🙏</div>
            <h1>Jai Jinendra</h1>
            <p>Send daily blessings with one tap</p>
        </header>

        <button id="installBtn" class="install-banner" style="display: none;">
            Install as PWA
        </button>

        <div id="contactList" class="button-grid">
            </div>

        <div class="admin-panel">
            <button onclick="toggleAdmin()" class="settings-btn">⚙️ Manage List</button>
            
            <div id="adminForm" class="admin-form" style="display: none;">
                <input type="text" id="newName" placeholder="Name (e.g. Rohit)" class="input-field">
                <input type="tel" id="newPhone" placeholder="Phone (91...)" class="input-field">
                <button onclick="addContact()" class="add-btn">➕ Save Person</button>
                <button onclick="toggleDeleteMode()" id="editBtn" class="edit-btn">🗑️ Delete Mode: OFF</button>
            </div>
        </div>
    </div>

    <script src="script.js">
        
    </script>
</body>
</html>
