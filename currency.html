<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <script>
      (function () {
        const theme = localStorage.getItem("theme") || "auto";
        if (
          theme === "dark" ||
          (theme === "auto" &&
            (new Date().getHours() >= 19 || new Date().getHours() < 7))
        ) {
          document.documentElement.setAttribute("data-theme", "dark");
        } else {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Currency Converter | Calcify</title>
    <meta
      name="description"
      content="Real-time currency converter with live exchange rates for over 30 global currencies. Fast, accurate, and easy to use."
    />
    <link rel="canonical" href="https://calc.aurabyte.in/currency" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="assets/fontawesome/css/all.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/custom-components.css" />
    <link rel="stylesheet" href="css/tool-page.css" />
    <link rel="stylesheet" href="css/currency.css" />

    <link rel="icon" href="assets/images/favicon-2.ico" type="image/x-icon" />
  </head>

  <body>
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="myBar"></div>
    </div>
    <header data-load="components/navbar.html"></header>

    <main>
      <div class="max-w-2xl mx-auto px-4 py-10">
        <!-- Hero -->
        <div class="text-center mb-8 animate-fade-in-up">
          <div
            class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full text-xs font-semibold mb-4"
            style="background: var(--accent-glow); color: var(--accent)"
          >
            <i class="fa-solid fa-money-bill-transfer"></i> Financial Tool
          </div>
          <h1
            class="text-2xl sm:text-3xl font-black mb-2"
            style="color: var(--text-primary)"
          >
            Currency Converter
          </h1>
          <p class="text-sm" style="color: var(--text-muted)">
            Get real-time exchange rates and convert global currencies
            instantly.
          </p>
        </div>

        <!-- Tool Container -->
        <div class="card-fresh p-6 sm:p-8 mb-4 animate-fade-in-up stagger-1">
          <div class="flex flex-col gap-6">
            <!-- Amount Input -->
            <div>
              <label
                class="block text-xs font-bold mb-2 uppercase tracking-wider"
                style="color: var(--text-muted)"
                >Amount</label
              >
              <input
                type="number"
                id="amount"
                class="form-control text-2xl font-bold p-4"
                value="1"
                oninput="convert()"
              />
            </div>

            <div class="flex flex-col md:flex-row items-center gap-4">
              <!-- From Currency -->
              <div class="flex-1 w-full">
                <label
                  class="block text-xs font-bold mb-2 uppercase tracking-wider"
                  style="color: var(--text-muted)"
                  >From</label
                >
                <select
                  id="fromCurrency"
                  class="form-select text-lg font-semibold"
                  onchange="convert()"
                >
                  <option value="USD">USD - US Dollar</option>
                  <option value="EUR">EUR - Euro</option>
                  <option value="GBP">GBP - British Pound</option>
                  <option value="INR" selected>INR - Indian Rupee</option>
                  <option value="JPY">JPY - Japanese Yen</option>
                  <option value="AUD">AUD - Australian Dollar</option>
                  <option value="CAD">CAD - Canadian Dollar</option>
                </select>
              </div>

              <!-- Swap Button -->
              <button
                onclick="swapCurrencies()"
                class="btn-ghost rounded-full w-12 h-12 flex items-center justify-center border-2 border-transparent hover:border-[var(--accent)] mt-4 md:mt-2 shrink-0 group transition-all"
                aria-label="Swap currencies"
              >
                <i
                  class="fa-solid fa-arrow-right-arrow-left text-xl group-hover:rotate-180 transition-transform duration-300"
                  style="color: var(--accent)"
                ></i>
              </button>

              <!-- To Currency -->
              <div class="flex-1 w-full">
                <label
                  class="block text-xs font-bold mb-2 uppercase tracking-wider"
                  style="color: var(--text-muted)"
                  >To</label
                >
                <select
                  id="toCurrency"
                  class="form-select text-lg font-semibold"
                  onchange="convert()"
                >
                  <option value="USD" selected>USD - US Dollar</option>
                  <option value="EUR">EUR - Euro</option>
                  <option value="GBP">GBP - British Pound</option>
                  <option value="INR">INR - Indian Rupee</option>
                  <option value="JPY">JPY - Japanese Yen</option>
                  <option value="AUD">AUD - Australian Dollar</option>
                  <option value="CAD">CAD - Canadian Dollar</option>
                </select>
              </div>
            </div>

            <!-- Result Display -->
            <div
              class="mt-4 p-6 rounded-2xl text-center"
              style="
                background: var(--bg-card-hover);
                border: 2px solid var(--border-color);
              "
            >
              <p
                class="text-sm font-bold uppercase tracking-widest mb-2"
                style="color: var(--text-muted)"
              >
                Converted Amount
              </p>
              <h2
                id="result"
                class="text-4xl font-black"
                style="color: var(--accent)"
              >
                --
              </h2>
              <p
                id="rateText"
                class="text-xs font-semibold mt-3"
                style="color: var(--text-secondary)"
              >
                Updating rates...
              </p>
            </div>
          </div>

          <div
            class="mt-8 text-center bg-green-50 dark:bg-green-900/10 p-4 rounded-xl border border-green-100 dark:border-green-900/30"
          >
            <i class="fa-solid fa-clock-rotate-left text-green-500 mb-1"></i>
            <p
              class="text-xs font-semibold"
              style="color: var(--text-secondary)"
            >
              Rates updated daily via Frankfurter Financial API.
            </p>
          </div>
        </div>

        <!-- Scroll Buttons -->
        <button onclick="gototop()" id="topbtn" aria-label="Scroll to top">
          <i class="fa-solid fa-arrow-up"></i>
        </button>
      </div>
    </main>

    <footer
      class="footer-custom mt-8"
      data-load="components/footer.html"
    ></footer>

    <script src="js/common.js"></script>
    <script src="js/custom-components.js"></script>
    <script src="js/currency.js"></script>
  </body>
</html>
