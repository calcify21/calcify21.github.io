<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <script>
      (function () {
        const theme = localStorage.getItem("theme") || "auto";
        if (
          theme === "dark" ||
          (theme === "auto" &&
            (new Date().getHours() >= 19 || new Date().getHours() < 7))
        ) {
          document.documentElement.setAttribute("data-theme", "dark");
        } else {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prime Number Checker | Is it a Prime? | Calcify</title>
    <meta
      name="description"
      content="Instantly check if a number is prime or composite. A fast, free, and accurate prime number validator for students and mathematicians."
    />
    <link rel="canonical" href="https://calc.aurabyte.in/prime" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="assets/fontawesome/css/all.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/tool-page.css" />

    <link rel="icon" href="assets/images/favicon-2.ico" type="image/x-icon" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://calc.aurabyte.in/prime" />
    <meta
      property="og:title"
      content="Prime Number Checker - Fast Online Tool | Calcify"
    />
    <meta
      property="og:description"
      content="Quickly verify if any number is prime. Perfect for math homework and number theory exploration."
    />
    <meta
      property="og:image"
      content="https://calc.aurabyte.in/assets/images/thumbnail.png"
    />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Prime Number Checker | Calcify" />
    <meta
      name="twitter:description"
      content="Check for prime numbers instantly with our easy-to-use tool."
    />
    <meta
      name="twitter:image"
      content="https://calc.aurabyte.in/assets/images/thumbnail.png"
    />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Prime Number Checker",
        "operatingSystem": "Any",
        "applicationCategory": "EducationalApplication",
        "description": "An online mathematical tool to determine whether a given number is a prime number or a composite number.",
        "url": "https://calc.aurabyte.in/prime",
        "image": "https://calc.aurabyte.in/assets/images/thumbnail.png",
        "publisher": {
          "@type": "Organization",
          "name": "Aurabyte",
          "url": "https://aurabyte.in"
        }
      }
    </script>

    <style>
      #result {
        display: none;
      }
    </style>
  </head>

  <body>
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="myBar"></div>
    </div>
    <header data-load="components/navbar.html"></header>

    <main>
      <div class="max-w-2xl mx-auto px-4 py-10">
        <!-- Hero -->
        <div class="text-center mb-8 animate-fade-in-up">
          <div
            class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full text-xs font-semibold mb-4"
            style="background: var(--accent-glow); color: var(--accent)"
          >
            <i class="fa-solid fa-hashtag"></i> Mathematical Tool
          </div>
          <h1
            class="text-2xl sm:text-3xl font-black mb-2"
            style="color: var(--text-primary)"
          >
            Prime Number Checker
          </h1>
          <p class="text-sm" style="color: var(--text-muted)">
            Enter any number to check if it's prime or composite.
          </p>
        </div>

        <!-- Card -->
        <div class="card-fresh p-6 sm:p-8 animate-fade-in-up stagger-1">
          <form>
            <div class="form-floating mb-4">
              <input
                type="number"
                class="form-control"
                id="number"
                placeholder="Enter a number"
                onkeyup="checkEnter(event)"
              />
              <label for="number">Enter the number</label>
            </div>
            <div class="flex gap-3">
              <button
                class="btn-calc btn-calc-primary"
                type="button"
                onclick="checkPrime()"
              >
                <a href="#result" class="inheritColor">Check</a>
              </button>
              <button
                class="btn-calc btn-calc-secondary"
                type="reset"
                onclick="resetbtn()"
                id="reset1"
              >
                Reset
              </button>
            </div>
          </form>
          <div class="mt-4">
            <div id="result" class="alert alert-success" role="alert"></div>
          </div>
        </div>

        <!-- Scroll Buttons -->
        <button onclick="gototop()" id="topbtn" aria-label="Scroll to top">
          <i class="fa-solid fa-arrow-up"></i>
        </button>
        <button
          onclick="gotobottom()"
          id="bottombtn"
          aria-label="Scroll to bottom"
        >
          <i class="fa-solid fa-arrow-down"></i>
        </button>
      </div>
    </main>

    <footer
      class="footer-custom mt-8"
      data-load="components/footer.html"
    ></footer>

    <script src="js/common.js"></script>
    <script src="js/prime.js"></script>
  </body>
</html>
