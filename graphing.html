<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <script>
      (function () {
        const theme = localStorage.getItem("theme") || "auto";
        if (
          theme === "dark" ||
          (theme === "auto" &&
            (new Date().getHours() >= 19 || new Date().getHours() < 7))
        ) {
          document.documentElement.setAttribute("data-theme", "dark");
        } else {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Graphing Calculator | Calcify</title>
    <meta
      name="description"
      content="Interactive 2D Graphing Calculator. Plot equations, visualize functions, and analyze math dynamically with our advanced graphing tool."
    />
    <link rel="canonical" href="https://calc.aurabyte.in/graphing" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="assets/fontawesome/css/all.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/tool-page.css" />
    <link rel="stylesheet" href="css/graphing.css" />

    <!-- External Libs -->
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.min.js"></script>

    <link rel="icon" href="assets/images/favicon-2.ico" type="image/x-icon" />
  </head>

  <body>
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="myBar"></div>
    </div>
    <header data-load="components/navbar.html"></header>

    <main>
      <div class="max-w-4xl mx-auto px-4 py-10">
        <!-- Hero -->
        <div class="text-center mb-8 animate-fade-in-up">
          <div
            class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full text-xs font-semibold mb-4"
            style="background: var(--accent-glow); color: var(--accent)"
          >
            <i class="fa-solid fa-chart-line"></i> Advanced Math
          </div>
          <h1
            class="text-2xl sm:text-3xl font-black mb-2"
            style="color: var(--text-primary)"
          >
            Graphing Calculator
          </h1>
          <p class="text-sm" style="color: var(--text-muted)">
            Type any function of x (e.g., sin(x), x^2, e^x) to plot its dynamic
            2D graph instantly.
          </p>
        </div>

        <!-- Tool Container -->
        <div class="card-fresh p-6 sm:p-8 mb-4 animate-fade-in-up stagger-1">
          <!-- Input Area -->
          <div class="flex flex-col sm:flex-row gap-4 mb-6 relative">
            <div class="relative flex-grow">
              <span
                class="absolute left-4 top-1/2 -translate-y-1/2 font-bold text-lg"
                style="color: var(--accent)"
                >f(x) =</span
              >
              <input
                type="text"
                id="equationInput"
                class="form-control"
                style="
                  padding-left: 4.5rem;
                  text-transform: lowercase;
                  font-size: 1.1rem;
                  letter-spacing: 0.5px;
                "
                placeholder="sin(x) * x"
                autocomplete="off"
                onkeypress="handleGraphEnter(event)"
              />
            </div>

            <button
              type="button"
              class="btn-calc btn-calc-primary px-8 whitespace-nowrap shadow-lg flex items-center justify-center gap-2"
              onclick="plotGraph()"
            >
              <i class="fa-solid fa-play"></i> Plot Graph
            </button>
          </div>

          <!-- Error Alert -->
          <div
            id="graphError"
            class="hidden alert text-red-500 bg-red-50 dark:bg-red-900/20 px-4 py-3 rounded-xl mb-4 text-sm font-semibold flex items-center gap-2 border border-red-200 dark:border-red-800/50"
          >
            <i class="fa-solid fa-triangle-exclamation"></i>
            <span id="graphErrorText">Invalid equation syntax.</span>
          </div>

          <!-- Plot Area Container -->
          <div
            class="w-full relative rounded-2xl overflow-hidden border"
            style="
              border-color: var(--border-color);
              background: var(--bg-card);
              min-height: 500px;
            "
          >
            <div id="plotlyCanvas" class="w-full h-full absolute inset-0"></div>
          </div>

          <div
            class="flex flex-wrap gap-2 mt-4 text-xs font-semibold uppercase tracking-wider"
            style="color: var(--text-muted)"
          >
            <span
              ><i class="fa-solid fa-lightbulb text-yellow-500"></i> Try:
            </span>
            <button
              onclick="quickPlot('x^2')"
              class="hover:text-[var(--accent)] transition-colors"
            >
              x^2
            </button>
            •
            <button
              onclick="quickPlot('sin(x)')"
              class="hover:text-[var(--accent)] transition-colors"
            >
              sin(x)
            </button>
            •
            <button
              onclick="quickPlot('sqrt(x)')"
              class="hover:text-[var(--accent)] transition-colors"
            >
              sqrt(x)
            </button>
            •
            <button
              onclick="quickPlot('1/x')"
              class="hover:text-[var(--accent)] transition-colors"
            >
              1/x
            </button>
          </div>
        </div>

        <!-- Scroll Buttons -->
        <button onclick="gototop()" id="topbtn" aria-label="Scroll to top">
          <i class="fa-solid fa-arrow-up"></i>
        </button>
      </div>
    </main>

    <footer
      class="footer-custom mt-8"
      data-load="components/footer.html"
    ></footer>

    <script src="js/common.js"></script>
    <script src="js/graphing.js"></script>
  </body>
</html>
