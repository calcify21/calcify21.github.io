<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <script>
      (function () {
        const theme = localStorage.getItem("theme") || "auto";
        if (
          theme === "dark" ||
          (theme === "auto" &&
            (new Date().getHours() >= 19 || new Date().getHours() < 7))
        ) {
          document.documentElement.setAttribute("data-theme", "dark");
        } else {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unit Converter | Calcify</title>
    <meta
      name="description"
      content="Convert over 50 different units quickly and accurately. Supports Length, Weight, Temperature, Area, Volume, and more."
    />
    <link rel="canonical" href="https://calc.aurabyte.in/unit" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="assets/fontawesome/css/all.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/custom-components.css" />
    <link rel="stylesheet" href="css/tool-page.css" />
    <link rel="stylesheet" href="css/unit.css" />

    <link rel="icon" href="assets/images/favicon-2.ico" type="image/x-icon" />
  </head>

  <body>
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="myBar"></div>
    </div>
    <header data-load="components/navbar.html"></header>

    <main>
      <div class="max-w-2xl mx-auto px-4 py-10">
        <!-- Hero -->
        <div class="text-center mb-8 animate-fade-in-up">
          <div
            class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full text-xs font-semibold mb-4"
            style="background: var(--accent-glow); color: var(--accent)"
          >
            <i class="fa-solid fa-ruler-combined"></i> Universal Converter
          </div>
          <h1
            class="text-2xl sm:text-3xl font-black mb-2"
            style="color: var(--text-primary)"
          >
            Unit Converter
          </h1>
          <p class="text-sm" style="color: var(--text-muted)">
            Convert instantly between different units of length, weight,
            temperature, and more.
          </p>
        </div>

        <!-- Tool Container -->
        <div class="card-fresh p-6 sm:p-8 mb-4 animate-fade-in-up stagger-1">
          <!-- Category Selector -->
          <div class="mb-6">
            <label
              class="block text-sm font-bold mb-2 uppercase tracking-wider"
              style="color: var(--text-muted)"
              >Conversion Category</label
            >
            <select
              id="unitCategory"
              class="form-select text-lg font-semibold"
              onchange="populateUnitOptions()"
            >
              <option value="length">Length</option>
              <option value="weight">Weight / Mass</option>
              <option value="temperature">Temperature</option>
              <option value="area">Area</option>
              <option value="volume">Volume</option>
              <option value="time">Time</option>
            </select>
          </div>

          <div class="divider my-6"></div>

          <!-- Conversion Interfaces -->
          <div class="flex flex-col md:flex-row items-center gap-4 relative">
            <!-- From Box -->
            <div class="flex-1 w-full relative">
              <label
                class="block text-xs font-bold mb-2 uppercase tracking-wider"
                style="color: var(--text-muted)"
                >From</label
              >
              <input
                type="number"
                id="inputValue"
                class="form-control text-2xl font-bold mb-3 p-4"
                placeholder="0"
                oninput="convert()"
              />
              <select
                id="fromUnit"
                class="form-select"
                onchange="convert()"
              ></select>
            </div>

            <!-- Swap Button -->
            <button
              onclick="swapUnits()"
              class="btn-ghost rounded-full w-12 h-12 flex items-center justify-center border-2 border-transparent hover:border-[var(--accent)] mt-4 md:mt-2 shrink-0 group transition-all"
              aria-label="Swap units"
            >
              <i
                class="fa-solid fa-arrow-right-arrow-left text-xl group-hover:rotate-180 transition-transform duration-300"
                style="color: var(--accent)"
              ></i>
            </button>

            <!-- To Box -->
            <div class="flex-1 w-full relative">
              <label
                class="block text-xs font-bold mb-2 uppercase tracking-wider"
                style="color: var(--text-muted)"
                >To</label
              >
              <input
                type="text"
                id="outputValue"
                class="form-control text-2xl font-bold mb-3 p-4 border-none"
                style="background: var(--bg-card-hover)"
                readonly
                placeholder="0"
              />
              <select
                id="toUnit"
                class="form-select"
                onchange="convert()"
              ></select>
            </div>
          </div>

          <div
            class="mt-8 text-center bg-blue-50 dark:bg-blue-900/10 p-4 rounded-xl border border-blue-100 dark:border-blue-900/30"
          >
            <i class="fa-solid fa-circle-info text-blue-500 mb-1"></i>
            <p
              class="text-xs font-semibold"
              style="color: var(--text-secondary)"
            >
              Formula used dynamically based on pure metric ratios.
            </p>
          </div>
        </div>

        <!-- Scroll Buttons -->
        <button onclick="gototop()" id="topbtn" aria-label="Scroll to top">
          <i class="fa-solid fa-arrow-up"></i>
        </button>
      </div>
    </main>

    <footer
      class="footer-custom mt-8"
      data-load="components/footer.html"
    ></footer>

    <script src="js/common.js"></script>
    <script src="js/custom-components.js"></script>
    <script src="js/unit.js"></script>
  </body>
</html>
