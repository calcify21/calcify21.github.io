<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <script>
      (function () {
        const theme = localStorage.getItem("theme") || "auto";
        if (
          theme === "dark" ||
          (theme === "auto" &&
            (new Date().getHours() >= 19 || new Date().getHours() < 7))
        ) {
          document.documentElement.setAttribute("data-theme", "dark");
        } else {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Age Calculator | Calcify</title>
    <meta
      name="description"
      content="Calculate your exact age in years, months, and days. Discover your upcoming birthday countdown and fun facts about your age."
    />
    <link rel="canonical" href="https://calc.aurabyte.in/age" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="assets/fontawesome/css/all.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/custom-components.css" />
    <link rel="stylesheet" href="css/tool-page.css" />
    <link rel="stylesheet" href="css/age.css" />

    <link rel="icon" href="assets/images/favicon-2.ico" type="image/x-icon" />
  </head>

  <body>
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="myBar"></div>
    </div>
    <header data-load="components/navbar.html"></header>

    <main>
      <div class="max-w-2xl mx-auto px-4 py-10">
        <!-- Hero -->
        <div class="text-center mb-8 animate-fade-in-up">
          <div
            class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full text-xs font-semibold mb-4"
            style="background: var(--accent-glow); color: var(--accent)"
          >
            <i class="fa-solid fa-cake-candles"></i> Life Tracker
          </div>
          <h1
            class="text-2xl sm:text-3xl font-black mb-2"
            style="color: var(--text-primary)"
          >
            Age Calculator
          </h1>
          <p class="text-sm" style="color: var(--text-muted)">
            Determine your precise age and countdown to your next big
            celebration.
          </p>
        </div>

        <!-- Tool Container -->
        <div class="card-fresh p-6 sm:p-8 mb-4 animate-fade-in-up stagger-1">
          <!-- DOB Input -->
          <div class="mb-8">
            <label
              class="block text-sm font-bold mb-3 uppercase tracking-wider"
              style="color: var(--text-muted)"
              >Select Date of Birth</label
            >
            <input
              type="date"
              id="dob"
              class="form-control text-xl font-bold p-4"
              onchange="calculateAge()"
            />
          </div>

          <button
            onclick="calculateAge()"
            class="btn-calc btn-calc-primary w-full mb-8 py-4"
          >
            <i class="fa-solid fa-wand-magic-sparkles"></i> Calculate Precise
            Age
          </button>

          <!-- Result Grid -->
          <div id="resultArea" class="hidden animate-fade-in">
            <div class="grid grid-cols-3 gap-4 mb-6">
              <div
                class="p-4 rounded-2xl text-center"
                style="
                  background: var(--bg-card-hover);
                  border: 2px solid var(--border-color);
                "
              >
                <h3
                  id="resYears"
                  class="text-3xl font-black"
                  style="color: var(--accent)"
                >
                  0
                </h3>
                <p
                  class="text-xs font-bold uppercase"
                  style="color: var(--text-muted)"
                >
                  Years
                </p>
              </div>
              <div
                class="p-4 rounded-2xl text-center"
                style="
                  background: var(--bg-card-hover);
                  border: 2px solid var(--border-color);
                "
              >
                <h3
                  id="resMonths"
                  class="text-3xl font-black"
                  style="color: var(--accent)"
                >
                  0
                </h3>
                <p
                  class="text-xs font-bold uppercase"
                  style="color: var(--text-muted)"
                >
                  Months
                </p>
              </div>
              <div
                class="p-4 rounded-2xl text-center"
                style="
                  background: var(--bg-card-hover);
                  border: 2px solid var(--border-color);
                "
              >
                <h3
                  id="resDays"
                  class="text-3xl font-black"
                  style="color: var(--accent)"
                >
                  0
                </h3>
                <p
                  class="text-xs font-bold uppercase"
                  style="color: var(--text-muted)"
                >
                  Days
                </p>
              </div>
            </div>

            <!-- Birthday Countdown -->
            <div
              class="p-6 rounded-2xl bg-orange-50 dark:bg-orange-900/10 border border-orange-100 dark:border-orange-900/30 text-center mb-6"
            >
              <p
                class="text-sm font-bold uppercase tracking-widest text-orange-600 dark:text-orange-400 mb-1"
              >
                Upcoming Birthday
              </p>
              <h3
                id="nextBdayText"
                class="text-xl font-black text-orange-700 dark:text-orange-300"
              >
                --
              </h3>
            </div>

            <div class="divider my-6"></div>

            <!-- Fun Facts Area -->
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
              <div class="text-center">
                <p
                  class="text-[10px] font-bold uppercase"
                  style="color: var(--text-muted)"
                >
                  Total Months
                </p>
                <p id="factMonths" class="font-bold">--</p>
              </div>
              <div class="text-center">
                <p
                  class="text-[10px] font-bold uppercase"
                  style="color: var(--text-muted)"
                >
                  Total Weeks
                </p>
                <p id="factWeeks" class="font-bold">--</p>
              </div>
              <div class="text-center">
                <p
                  class="text-[10px] font-bold uppercase"
                  style="color: var(--text-muted)"
                >
                  Total Days
                </p>
                <p id="factDays" class="font-bold">--</p>
              </div>
              <div class="text-center">
                <p
                  class="text-[10px] font-bold uppercase"
                  style="color: var(--text-muted)"
                >
                  Total Hours
                </p>
                <p id="factHours" class="font-bold">--</p>
              </div>
            </div>
          </div>
        </div>

        <!-- Scroll Buttons -->
        <button onclick="gototop()" id="topbtn" aria-label="Scroll to top">
          <i class="fa-solid fa-arrow-up"></i>
        </button>
      </div>
    </main>

    <footer
      class="footer-custom mt-8"
      data-load="components/footer.html"
    ></footer>

    <script src="js/common.js"></script>
    <script src="js/custom-components.js"></script>
    <script src="js/age.js"></script>
  </body>
</html>
