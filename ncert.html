<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <script>
      (function () {
        const theme = localStorage.getItem("theme") || "auto";
        if (
          theme === "dark" ||
          (theme === "auto" &&
            (new Date().getHours() >= 19 || new Date().getHours() < 7))
        ) {
          document.documentElement.setAttribute("data-theme", "dark");
        } else {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NCERT E-Book Hub (Class 9-12) | Calcify</title>
    <meta
      name="description"
      content="Access NCERT E-Books instantly for Classes 9-12 (English Medium). Free, fast, and easy to use."
    />
    <link rel="canonical" href="https://calc.aurabyte.in/ncert" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <link href="assets/fontawesome/css/all.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/tool-page.css" />
    <link rel="stylesheet" href="css/ncert.css" />

    <link rel="icon" href="assets/images/favicon-2.ico" type="image/x-icon" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://calc.aurabyte.in/ncert" />
    <meta property="og:title" content="NCERT E-Book Hub | Calcify" />
    <meta
      property="og:description"
      content="Access NCERT E-Books instantly for Classes 9-12 (English Medium)."
    />
  </head>

  <body class="min-h-screen">
    <header data-load="components/navbar.html"></header>
    <main>
      <div id="app-container" class="max-w-4xl mx-auto p-4 sm:p-6 lg:p-8">
        <header class="text-center mb-8">
          <h1
            class="text-4xl font-extrabold mb-2"
            style="color: var(--text-primary)"
          >
            NCERT E-Book Hub
          </h1>
          <p style="color: var(--text-secondary)">
            Access your e-books instantly (English Medium).
          </p>
          <div id="status" class="text-xs text-green-500 mt-2">
            Data Loaded Locally.
          </div>
        </header>

        <!-- Class Selector Tabs -->
        <div
          id="class-selector"
          class="flex justify-center gap-3 mb-8 flex-wrap"
        >
          <button
            id="tab-class-8"
            onclick="selectClass(8)"
            data-class="8"
            class="class-tab class-tab-inactive hidden"
          >
            Class 8
          </button>
          <button
            id="tab-class-9"
            onclick="selectClass(9)"
            data-class="9"
            class="class-tab class-tab-active"
          >
            Class 9
          </button>
          <button
            onclick="selectClass(10)"
            data-class="10"
            class="class-tab class-tab-inactive"
          >
            Class 10
          </button>
          <button
            onclick="selectClass(11)"
            data-class="11"
            class="class-tab class-tab-inactive"
          >
            Class 11
          </button>
          <button
            onclick="selectClass(12)"
            data-class="12"
            class="class-tab class-tab-inactive"
          >
            Class 12
          </button>
        </div>

        <div id="content-area">
          <div id="loading-spinner" class="text-center p-12">
            <svg
              class="animate-spin h-8 w-8 text-blue-500 mx-auto"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
            >
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              ></circle>
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
              ></path>
            </svg>
            <p class="mt-3" style="color: var(--text-secondary)">
              Loading subjects...
            </p>
          </div>
        </div>
      </div>
      
      <!-- Floating Bottom Tab Switcher -->
      <div class="fixed bottom-6 w-full flex justify-center z-50 pointer-events-none">
        <div class="glass-switcher pointer-events-auto flex items-center p-1.5 rounded-2xl shadow-xl border border-gray-200/80 dark:border-gray-700/80 backdrop-blur-xl">
            <button id="board-btn-ncert" onclick="setBoard('NCERT')" class="switcher-btn switcher-btn-active px-8 py-3 rounded-xl font-bold text-sm sm:text-base transition-all duration-300 focus:outline-none flex items-center">
                <i data-lucide="book-open" class="w-4 h-4 mr-2"></i> NCERT
            </button>
            <button id="board-btn-cbse" onclick="setBoard('CBSE')" class="switcher-btn switcher-btn-inactive px-8 py-3 rounded-xl font-bold text-sm sm:text-base transition-all duration-300 focus:outline-none flex items-center">
                <i data-lucide="landmark" class="w-4 h-4 mr-2"></i> CBSE
            </button>
        </div>
      </div>
    </main>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

    <script src="js/cbse.js"></script>
    <script src="js/ncert.js"></script>
    <footer
      class="footer-custom mt-8"
      data-load="components/footer.html"
    ></footer>
    <script src="js/common.js"></script>
  </body>
</html>
